<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Amigo-Pointer 2026 | Pro Precision</title>
    <style>
        :root { 
            --accent: #00d2ff; 
            --primary: #8a2be2; 
            --detail: #ff007f; 
            --bg-top: #1a0b2e;
            --bg-bottom: #050505;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%); 
            color: #fff; overflow: hidden; 
        }

        /* --- PANTALLA DE INICIO PROFESIONAL --- */
        #setup { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            width: 100%; height: 100dvh; padding: 0 10%; text-align: center;
        }

        .hero-title { margin-bottom: 40px; }
        .hero-title h1 { font-size: clamp(32px, 8vw, 42px); font-weight: 800; letter-spacing: -1px; margin: 0; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-title p { color: var(--primary); font-size: 12px; font-weight: 700; letter-spacing: 5px; margin-top: 8px; text-transform: uppercase; }

        .glass-card {
            background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); padding: 40px 30px; border-radius: 32px;
            width: 100%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        .btn-pro { 
            background: linear-gradient(90deg, var(--primary), var(--accent)); color: #fff; border: none; 
            padding: 20px; border-radius: 18px; font-weight: 800; cursor: pointer; width: 100%; 
            font-size: 16px; box-shadow: 0 8px 20px rgba(138, 43, 226, 0.3); transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-pro:active { transform: scale(0.96); box-shadow: 0 4px 10px rgba(138, 43, 226, 0.2); }
        .btn-outline { background: transparent; border: 1px solid #333; color: #888; margin-top: 15px; font-size: 13px; }

        input.pro-input { 
            width: 100%; padding: 22px; margin: 25px 0 12px; border: 1px solid #333; border-radius: 18px; 
            font-size: 32px; text-align: center; background: rgba(0,0,0,0.3); color: #fff; font-weight: 800;
            letter-spacing: 10px;
        }

        /* --- INTERFAZ APP --- */
        #app { display: none; flex-direction: column; width: 100%; height: 100dvh; position: relative; }

        .top-nav {
            padding: var(--safe-top) 20px 0; height: 80px; display: flex; 
            justify-content: space-between; align-items: center; z-index: 100;
        }
        .back-pill { background: rgba(255,0,0,0.1); border: 1px solid rgba(255,0,0,0.2); padding: 10px 20px; border-radius: 50px; font-size: 11px; font-weight: 800; color: #ff4d4d; cursor: pointer; }
        .room-pill { background: var(--glass); border: 1px solid var(--glass-border); padding: 10px 20px; border-radius: 50px; font-size: 12px; font-weight: 800; color: var(--accent); font-family: monospace; }

        .radar-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* RADAR HD */
        .radar-base {
            position: relative; width: clamp(280px, 82vmin, 420px); height: clamp(280px, 82vmin, 420px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.05) 0%, transparent 80%);
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }
        
        /* Grid Lines */
        .radar-base::before { content: ''; position: absolute; width: 100%; height: 1px; background: rgba(255,255,255,0.05); }
        .radar-base::after { content: ''; position: absolute; height: 100%; width: 1px; background: rgba(255,255,255,0.05); }

        .radar-ring { position: absolute; border: 1px solid rgba(255,255,255,0.03); border-radius: 50%; }
        .ring-1 { width: 66%; height: 66%; }
        .ring-2 { width: 33%; height: 33%; }

        .friend-orbit { position: absolute; width: 100%; height: 100%; border-radius: 50%; transition: transform 0.6s cubic-bezier(0.1, 0.5, 0.5, 1); }
        .friend-beeper { 
            position: absolute; top: -14px; left: 50%; transform: translateX(-50%); 
            width: 28px; height: 28px; background: #fff; border-radius: 50%; 
            box-shadow: 0 0 20px #fff, 0 0 40px var(--detail); border: 4px solid var(--detail); 
        }

        .pointer-arrow { 
            width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; 
            border-bottom: 70px solid var(--accent); transition: transform 0.2s cubic-bezier(0.1, 0.5, 0.5, 1); 
            filter: drop-shadow(0 0 15px var(--accent));
        }

        .info-panel { text-align: center; margin-top: 40px; }
        .info-panel h2 { font-size: clamp(70px, 18vw, 110px); font-weight: 800; margin: 0; line-height: 0.9; letter-spacing: -4px; font-family: 'Courier New', Courier, monospace; }
        .info-panel span { font-size: 14px; font-weight: 800; color: var(--accent); letter-spacing: 6px; text-transform: uppercase; opacity: 0.5; }

        /* --- BLACK BOX TABS --- */
        .tab-navigation { height: 75px; background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(10px); border-top: 1px solid #222; display: flex; padding-bottom: var(--safe-bottom); }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; font-size: 10px; font-weight: 800; letter-spacing: 2px; }
        .tab-item.active { color: var(--accent); }
        .tab-item b { font-size: 20px; margin-bottom: 4px; font-weight: normal; }

        .log-screen { flex: 1; overflow-y: auto; padding: 25px; font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 10px; color: #00ff00; background: #050505; display: none; }
        .log-screen.active { display: block; }
        .packet-card { background: #0d0d0d; padding: 15px; margin: 12px 0; border-radius: 12px; border: 1px solid #1a1a1a; color: #00d2ff; white-space: pre-wrap; word-break: break-all; }

        .gps-badge { position: fixed; top: 15px; right: 20px; font-size: 9px; font-weight: 900; color: #333; z-index: 200; background: rgba(0,0,0,0.5); padding: 4px 12px; border-radius: 50px; border: 1px solid #222; }
        .gps-active { color: #00ff00 !important; border-color: rgba(0,255,0,0.2); }
    </style>
</head>
<body>

    <!-- PANTALLA 1: SETUP -->
    <div id="setup">
        <div class="hero-title">
            <h1>PRECISION SYNC</h1>
            <p>Party Locator v11.0</p>
        </div>

        <div class="glass-card">
            <button class="btn-pro" onclick="createRoom()">NUEVA SESIÓN</button>
            <div style="margin: 25px 0; font-size: 10px; color: #444; font-weight: 900; letter-spacing: 2px;">O VINCULAR CÓDIGO</div>
            <input type="number" id="roomCode" class="pro-input" placeholder="0000" maxlength="4">
            <button class="btn-pro btn-outline" onclick="joinRoom()">ESTABLECER VÍNCULO</button>
        </div>
    </div>

    <!-- PANTALLA 2: RADAR -->
    <div id="app">
        <div class="gps-badge" id="gpsIndicator">SIGNAL: SEARCHING</div>

        <header class="top-nav">
            <div class="back-pill" onclick="if(confirm('¿Finalizar sesión?')) location.reload()">ABORT SESSION</div>
            <div class="room-pill" id="roomBadge">NET_ID: 0000</div>
        </header>

        <main class="radar-section">
            <div id="view-radar" class="view active" style="position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                <div class="radar-base">
                    <div class="radar-ring ring-1"></div>
                    <div class="radar-ring ring-2"></div>
                    <div class="friend-orbit" id="orbit"><div class="friend-beeper"></div></div>
                    <div class="pointer-arrow" id="arrow"></div>
                </div>
                <div class="info-panel">
                    <h2 id="dist">--</h2>
                    <span id="unit">SCANNING...</span>
                </div>
            </div>

            <section id="view-logs" class="log-screen">
                [SYSTEM] Precision Sync Kernel v11.0 Active...
            </section>
        </main>

        <nav class="tab-navigation">
            <div class="tab-item active" id="tab-radar" onclick="switchTab('radar')">
                <b>◎</b><span>RADAR</span>
            </div>
            <div class="tab-item" id="tab-logs" onclick="switchTab('logs')">
                <b>▤</b><span>BLACK BOX</span>
            </div>
        </nav>
    </div>

    <script>
        const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbzpbZICE4tLFTlwTQxSyVe_2q3H7SW5qHG74MUymTA1-qs_4UNnDCyvPcIxoVsK9prGUg/exec";
        let sessionId = "", myId = "", myLoc = null, friendLoc = null, heading = 0;
        let currentHeading = 0, filteredHeading = 0;
        const EMA_ALPHA = 0.15; // Suavizado ultra-fino para v11

        function switchTab(id) {
            document.getElementById('view-radar').classList.toggle('active', id === 'radar');
            document.getElementById('view-logs').classList.toggle('active', id === 'logs');
            document.getElementById('tab-radar').classList.toggle('active', id === 'radar');
            document.getElementById('tab-logs').classList.toggle('active', id === 'logs');
        }

        // --- BLACK BOX ENGINE (LÓGICA PROTEGIDA) ---
        function addLog(msg, raw = null) {
            const console = document.getElementById('view-logs');
            const time = new Date().toLocaleTimeString();
            let html = `<div style="margin-bottom:15px; border-bottom: 1px solid #111; padding-bottom: 10px;">[${time}] ${msg}`;
            if (raw) html += `<div class="packet-card">${JSON.stringify(raw, null, 2)}</div>`;
            html += `</div>`;
            console.innerHTML += html;
            console.scrollTop = console.scrollHeight;
        }

        navigator.geolocation.watchPosition((pos) => {
            myLoc = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            const indicator = document.getElementById('gpsIndicator');
            indicator.innerText = "SIGNAL: ACTIVE";
            indicator.classList.add('gps-active');
            if(!sessionId) addLog("SIGNAL_LOCK_SUCCESS", myLoc);
        }, (err) => addLog("SIGNAL_FAILURE", err.message), { enableHighAccuracy: true });

        window.addEventListener('deviceorientationabsolute', (e) => {
            let h = e.alpha || e.webkitCompassHeading || 0;
            let diff = h - filteredHeading;
            if (diff > 180) diff -= 360;
            if (diff < -180) diff += 360;
            filteredHeading += EMA_ALPHA * diff;
            currentHeading = (filteredHeading + 360) % 360;
            if(sessionId && friendLoc) updateUI();
        }, true);

        function sync() {
            if (!sessionId || !myLoc) return;
            const cb = "cb_" + Date.now();
            const url = `${GOOGLE_URL}?sala=${sessionId}&userId=${myId}&lat=${myLoc.lat}&lon=${myLoc.lon}&callback=${cb}`;
            addLog("PULSE_SENT", { id: sessionId });
            const script = document.createElement("script");
            script.src = url;
            window[cb] = function(res) {
                addLog("PULSE_RECEIVED", res);
                if (res.status === "DEBUG_OK" && res.friend_data) {
                    friendLoc = res.friend_data;
                    updateUI();
                }
                delete window[cb];
                document.body.removeChild(script);
            };
            document.body.appendChild(script);
        }

        setInterval(sync, 4000);

        function createRoom() { sessionId = Math.floor(1000 + Math.random() * 9000).toString(); myId = "u1"; launch(); }
        function joinRoom() { const code = document.getElementById('roomCode').value; if (code.length < 4) return; sessionId = code; myId = "u2"; launch(); }

        function launch() {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('roomBadge').innerText = "NET_ID: " + sessionId;
            addLog(`HANDSHAKE_COMPLETE: ${sessionId}`);
        }

        function updateUI() {
            if (!myLoc || !friendLoc) return;
            const dist = getDistance(myLoc.lat, myLoc.lon, friendLoc.lat, friendLoc.lon);
            const bearing = getBearing(myLoc.lat, myLoc.lon, friendLoc.lat, friendLoc.lon);
            const angle = (bearing - currentHeading + 360) % 360;
            document.getElementById('arrow').style.transform = `rotate(${angle}deg)`;
            document.getElementById('orbit').style.transform = `rotate(${angle}deg)`;
            
            if (dist < 1) {
                document.getElementById('dist').innerText = (dist * 1000).toFixed(0);
                document.getElementById('unit').innerText = "METROS";
            } else {
                document.getElementById('dist').innerText = dist.toFixed(2);
                document.getElementById('unit').innerText = "KILÓMETROS";
            }
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const a = Math.sin(((lat2-lat1)*Math.PI/180)/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(((lon2-lon1)*Math.PI/180)/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function getBearing(lat1, lon1, lat2, lon2) {
            const l1 = lat1 * Math.PI / 180, l2 = lat2 * Math.PI / 180, dl = (lon2 - lon1) * Math.PI / 180;
            const y = Math.sin(dl) * Math.cos(l2), x = Math.cos(l1) * Math.sin(l2) - Math.sin(l1) * Math.cos(l2) * Math.cos(dl);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }
    </script>
</body>
</html>
