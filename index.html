<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Amigo-Pointer 2026 | High Precision</title>
    <style>
        :root { 
            --accent: #00d2ff; --primary: #7000ff; --detail: #ff007f; --bg: #050010; --text: #ffffff;
            --safe-top: env(safe-area-inset-top, 20px); --safe-bottom: env(safe-area-inset-bottom, 20px);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); overflow: hidden; font-family: 'Inter', sans-serif; }

        /* --- UI PRINCIPAL --- */
        #setup { display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; height: 100dvh; padding: 0 10%; text-align: center; background: radial-gradient(circle at center, #1a0033 0%, #050010 100%); }
        .btn { background: linear-gradient(45deg, var(--primary), var(--accent)); color: #fff; border: none; padding: 20px; border-radius: 18px; font-weight: 900; cursor: pointer; width: 100%; font-size: 15px; box-shadow: 0 10px 30px rgba(112,0,255,0.3); text-transform: uppercase; }
        input { width: 100%; padding: 20px; margin: 25px 0 10px; border: 2px solid #1a1a1a; border-radius: 18px; font-size: 32px; text-align: center; background: #000; color: #fff; font-weight: 900; }

        #app { display: none; flex-direction: column; width: 100%; height: 100dvh; position: relative; }
        .top-nav { padding: var(--safe-top) 20px 0; height: 80px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .abort-btn { background: #200; border: 1px solid #400; padding: 8px 15px; border-radius: 10px; font-size: 10px; font-weight: 900; color: #f44; cursor: pointer; }
        
        .radar-view { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .radar-disc { position: relative; width: clamp(280px, 80vmin, 400px); height: clamp(280px, 80vmin, 400px); border: 2px solid rgba(0, 210, 255, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #0a001a 0%, #000 100%); }
        
        .orbit { position: absolute; width: 100%; height: 100%; border-radius: 50%; transition: transform 0.5s cubic-bezier(0.1, 0.5, 0.5, 1); }
        .friend-led { position: absolute; top: -14px; left: 50%; transform: translateX(-50%); width: 28px; height: 28px; background: #fff; border-radius: 50%; box-shadow: 0 0 20px #fff, 0 0 40px var(--detail); border: 4px solid var(--detail); }
        .arrow-el { width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; border-bottom: 65px solid var(--accent); transition: transform 0.1s linear; filter: drop-shadow(0 0 15px var(--accent)); }
        
        .metrics { text-align: center; margin-top: 40px; }
        .m-val { font-size: 80px; font-weight: 900; margin: 0; line-height: 1; text-shadow: 0 0 30px var(--primary); font-family: monospace; }
        .m-label { font-size: 12px; font-weight: 800; color: var(--accent); letter-spacing: 6px; opacity: 0.6; }

        /* INDICADOR DE PRECISIÓN */
        .acc-pill { position: fixed; top: 15px; right: 20px; font-size: 9px; font-weight: 900; background: #111; padding: 4px 12px; border-radius: 20px; color: #444; border: 1px solid #222; }
        .acc-good { color: #00ff00 !important; border-color: #00ff0055; }
        .acc-bad { color: #ffaa00 !important; border-color: #ffaa0055; }

        /* BLACK BOX TABS */
        .nav-bar { height: 75px; background: #080808; border-top: 1px solid #111; display: flex; padding-bottom: var(--safe-bottom); }
        .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #333; font-size: 9px; font-weight: 900; letter-spacing: 2px; }
        .nav-tab.active { color: var(--accent); }
        .log-screen { flex: 1; overflow-y: auto; padding: 20px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #4ade80; background: #000; display: none; }
        .log-screen.active { display: block; }
        .raw-packet { background: #050010; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #1a0033; color: #00d2ff; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body>

    <div id="setup">
        <h1 style="color: #fff;">AMIGO FINDER ◎</h1>
        <div style="color: var(--primary); font-size: 10px; letter-spacing: 5px; margin-top: 5px;">PRECISION ENGINE v10.0</div>
        <div class="setup-card">
            <button class="btn" onclick="createRoom()">NEW SESSION</button>
            <input type="number" id="roomCode" placeholder="0000" maxlength="4">
            <button class="btn" style="background: transparent; border: 1px solid #333; color: #555; margin-top: 15px;" onclick="joinRoom()">JOIN CONNECTION</button>
        </div>
    </div>

    <div id="app">
        <div class="acc-pill" id="accPill">ACCURACY: --m</div>
        <header class="top-nav">
            <div class="abort-btn" onclick="if(confirm('¿Abortar?')) location.reload()">ABORT</div>
            <div id="idBadge" style="font-family: monospace; font-weight: 900; color: #444;">NET_ID: 0000</div>
        </header>

        <main class="view-container" style="flex: 1; display: flex; flex-direction: column;">
            <section id="view-radar" class="radar-view active">
                <div class="radar-disc">
                    <div class="orbit" id="orbit"><div class="friend-led"></div></div>
                    <div class="arrow-el" id="arrow"></div>
                </div>
                <div class="metrics">
                    <h2 class="m-val" id="dist">--</h2>
                    <span class="m-label" id="unit">SCANNING...</span>
                </div>
            </section>

            <section id="view-logs" class="log-screen">
                [SYSTEM] Precision Kernel Active. Awaiting data...
            </section>
        </main>

        <nav class="nav-bar">
            <div class="nav-tab active" id="tab-radar" onclick="switchTab('radar')">◎ RADAR</div>
            <div class="nav-tab" id="tab-logs" onclick="switchTab('logs')">▤ BLACK BOX</div>
        </nav>
    </div>

    <script>
        const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbzpbZICE4tLFTlwTQxSyVe_2q3H7SW5qHG74MUymTA1-qs_4UNnDCyvPcIxoVsK9prGUg/exec";
        let sessionId = "", myId = "", myLoc = null, friendLoc = null;
        let currentHeading = 0, filteredHeading = 0;
        const EMA_ALPHA = 0.2; // Suavizado de brújula (0.1 = Muy suave, 0.9 = Rápido)

        function switchTab(id) {
            document.getElementById('view-radar').classList.toggle('active', id === 'radar');
            document.getElementById('view-logs').classList.toggle('active', id === 'logs');
            document.getElementById('tab-radar').classList.toggle('active', id === 'radar');
            document.getElementById('tab-logs').classList.toggle('active', id === 'logs');
        }

        // --- BLACK BOX (PROTECTED) ---
        function addLog(msg, raw = null) {
            const console = document.getElementById('view-logs');
            const time = new Date().toLocaleTimeString();
            let html = `<div style="margin-bottom:15px; border-bottom: 1px solid #111; padding-bottom: 10px;">[${time}] ${msg}`;
            if (raw) html += `<div class="raw-packet">${JSON.stringify(raw, null, 2)}</div>`;
            html += `</div>`;
            console.innerHTML += html;
            console.scrollTop = console.scrollHeight;
        }

        // --- GPS CON MONITOR DE PRECISIÓN ---
        navigator.geolocation.watchPosition((pos) => {
            myLoc = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            const acc = pos.coords.accuracy;
            const pill = document.getElementById('accPill');
            pill.innerText = `ACCURACY: ${acc.toFixed(0)}m`;
            pill.className = `acc-pill ${acc < 15 ? 'acc-good' : 'acc-bad'}`;
            if(!sessionId) addLog("GPS_LINK_ESTABLISHED", {lat: myLoc.lat, lon: myLoc.lon, acc: acc});
        }, (err) => addLog("GPS_ERROR: " + err.message), { enableHighAccuracy: true });

        // --- BRÚJULA CON FILTRO EMA ---
        window.addEventListener('deviceorientationabsolute', (e) => {
            let heading = e.alpha || e.webkitCompassHeading || 0;
            
            // Corrección de cruce 0/360 para el filtro
            let diff = heading - filteredHeading;
            if (diff > 180) diff -= 360;
            if (diff < -180) diff += 360;
            
            filteredHeading += EMA_ALPHA * diff;
            currentHeading = (filteredHeading + 360) % 360;
            
            updateUI();
        }, true);

        // --- SYNC ENGINE ---
        async function sync() {
            if (!sessionId || !myLoc) return;
            const cb = "cb_" + Date.now();
            const url = `${GOOGLE_URL}?sala=${sessionId}&userId=${myId}&lat=${myLoc.lat}&lon=${myLoc.lon}&callback=${cb}`;
            addLog("PULSE_OUT", { id: sessionId });
            const script = document.createElement("script");
            script.src = url;
            window[cb] = function(res) {
                addLog("PULSE_IN", res);
                if (res.status === "DEBUG_OK" && res.friend_data) {
                    friendLoc = res.friend_data;
                    updateUI();
                }
                delete window[cb];
                document.body.removeChild(script);
            };
            document.body.appendChild(script);
        }
        setInterval(sync, 4000);

        function createRoom() { sessionId = Math.floor(1000 + Math.random() * 9000).toString(); myId = "u1"; launch(); }
        function joinRoom() { const code = document.getElementById('roomCode').value; if (code.length < 4) return; sessionId = code; myId = "u2"; launch(); }
        function launch() { document.getElementById('setup').style.display = 'none'; document.getElementById('app').style.display = 'flex'; document.getElementById('idBadge').innerText = "NET_ID: " + sessionId; addLog(`SESSION_INIT: ${sessionId}`); }

        function updateUI() {
            if (!myLoc || !friendLoc) return;
            const dist = getDistance(myLoc.lat, myLoc.lon, friendLoc.lat, friendLoc.lon);
            const bearing = getBearing(myLoc.lat, myLoc.lon, friendLoc.lat, friendLoc.lon);
            
            // Dirección final = Rumbo al amigo - Mi orientación actual
            const angle = (bearing - currentHeading + 360) % 360;
            
            document.getElementById('arrow').style.transform = `rotate(${angle}deg)`;
            document.getElementById('orbit').style.transform = `rotate(${angle}deg)`;
            
            if (dist < 1) {
                document.getElementById('dist').innerText = (dist * 1000).toFixed(0);
                document.getElementById('unit').innerText = "METERS";
            } else {
                document.getElementById('dist').innerText = dist.toFixed(2);
                document.getElementById('unit').innerText = "KILOMETERS";
            }
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const a = Math.sin(((lat2-lat1)*Math.PI/180)/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(((lon2-lon1)*Math.PI/180)/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function getBearing(lat1, lon1, lat2, lon2) {
            const l1 = lat1 * Math.PI / 180, l2 = lat2 * Math.PI / 180, dl = (lon2 - lon1) * Math.PI / 180;
            const y = Math.sin(dl) * Math.cos(l2), x = Math.cos(l1) * Math.sin(l2) - Math.sin(l1) * Math.cos(l2) * Math.cos(dl);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }
    </script>
</body>
</html>
