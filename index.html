<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Amigo-Pointer 2026 | Radar Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { 
            --accent: #4ade80; 
            --bg: #0a0a0a; 
            --text: #ffffff;
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --pulse-scale: 1;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text);
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            height: 100dvh; overflow: hidden; 
        }

        #setup { display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; max-width: 500px; padding: 40px 10%; height: 100%; }
        .btn { background: #fff; color: #000; border: none; padding: 20px; border-radius: 18px; font-weight: 800; cursor: pointer; width: 100%; font-size: 18px; box-shadow: 0 10px 20px rgba(255,255,255,0.1); }
        input { width: 100%; padding: 20px; margin: 15px 0; border: 3px solid #333; border-radius: 18px; font-size: 26px; text-align: center; background: #1a1a1a; font-weight: 900; color: #fff; }

        #app { display: none; flex-direction: column; width: 100%; height: 100%; padding: var(--safe-top) 20px var(--safe-bottom); }

        .header { width: 100%; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        .room-tag { background: #fff; color: #000; padding: 10px 25px; border-radius: 30px; font-size: 20px; font-weight: 900; }
        
        .main-view { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; }

        /* EL RADAR */
        .radar-box { position: relative; width: clamp(260px, 75vmin, 420px); height: clamp(260px, 75vmin, 420px); display: flex; align-items: center; justify-content: center; }

        /* Halo Pulsante */
        .proximity-halo {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid var(--accent);
            border-radius: 50%;
            opacity: 0.3;
            transform: scale(var(--pulse-scale));
            transition: transform 0.2s ease-out, border-color 0.3s;
            box-shadow: 0 0 30px var(--accent);
        }

        .compass-outer { 
            position: relative; 
            width: 85%; height: 85%; 
            border: 4px solid rgba(255,255,255,0.1); 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            background: rgba(255,255,255,0.02);
            z-index: 2;
        }

        /* Indicador que gira alrededor */
        .friend-orbit {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: transform 0.1s linear;
        }
        .friend-dot {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--accent);
        }

        #arrow { 
            width: 0; height: 0; 
            border-left: 20px solid transparent; border-right: 20px solid transparent; 
            border-bottom: 60px solid var(--accent); 
            transition: transform 0.15s cubic-bezier(0.1, 0.5, 0.5, 1); 
            filter: drop-shadow(0 0 10px var(--accent));
        }

        .center-pin { position: absolute; width: 10px; height: 10px; background: #fff; border-radius: 50%; }
        
        .info-panel { text-align: center; margin-top: 30px; }
        #dist { font-size: clamp(50px, 15vw, 85px); font-weight: 900; line-height: 1; margin: 10px 0; }
        #status { font-size: 14px; color: #666; letter-spacing: 4px; font-weight: 800; }
        
        .exit-btn { color: #ff4444; font-weight: 800; font-size: 14px; padding: 12px 30px; border-radius: 12px; border: 2px solid #ff4444; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="setup">
        <h1 style="color: #fff;">🦅 RADAR-POINTER</h1>
        <div style="color: #666; letter-spacing: 3px; margin-bottom: 50px;">VERSION 2.0 | AMIGO SYNC</div>
        
        <button class="btn" onclick="createRoom()">CREAR RADAR</button>
        <div style="width:100%; display: flex; align-items: center; margin: 30px 0;"><div style="flex:1; height:1px; background:#333;"></div><span style="padding: 0 15px; color:#444;">O</span><div style="flex:1; height:1px; background:#333;"></div></div>
        <input type="number" id="roomCode" placeholder="CÓDIGO RADAR">
        <button class="btn" style="background: #333; color: #fff; box-shadow: none;" onclick="joinRoom()">UNIRSE</button>
    </div>

    <div id="app">
        <div class="header">
            <span class="room-tag" id="roomDisplay">SALA: ----</span>
            <div id="roleDisplay" style="margin-top: 12px; font-size: 12px; color: #444; font-weight: bold;">ESPERANDO AMIGO...</div>
        </div>
        
        <div class="main-view">
            <div class="radar-box">
                <!-- Halo que se agranda/achica -->
                <div class="proximity-halo" id="halo"></div>
                
                <!-- Órbita que gira alrededor -->
                <div class="friend-orbit" id="orbit">
                    <div class="friend-dot"></div>
                </div>

                <div class="compass-outer">
                    <div id="arrow"></div>
                    <div class="center-pin"></div>
                </div>
            </div>
            
            <div class="info-panel">
                <div id="dist">--m</div>
                <div id="status">UBICANDO OBJETIVO...</div>
            </div>
        </div>
        
        <div style="display:flex; justify-content:center;">
            <div class="exit-btn" onclick="location.reload()">DESCONECTAR</div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://amigo-pointer-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let sessionId = "", myId = "", myLoc = null, friendLoc = null, heading = 0;
        let pulseTimer = 0;

        // SENSORES
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientationabsolute', (e) => {
                heading = e.alpha || e.webkitCompassHeading || 0;
                updateUI();
            }, true);
        }

        navigator.geolocation.watchPosition((pos) => {
            myLoc = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            if (sessionId) syncLoc();
            updateUI();
        }, null, { enableHighAccuracy: true });

        function createRoom() {
            sessionId = Math.floor(1000 + Math.random() * 9000).toString();
            myId = "u1";
            db.ref('sessions/' + sessionId).set({ created: Date.now() });
            startSession();
        }

        function joinRoom() {
            sessionId = document.getElementById('roomCode').value;
            if (sessionId.length < 4) return;
            myId = "u2";
            startSession();
        }

        function startSession() {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('roomDisplay').innerText = "RADAR: " + sessionId;
            const friendId = myId === "u1" ? "u2" : "u1";
            db.ref('sessions/' + sessionId + '/' + friendId).on('value', (snap) => {
                friendLoc = snap.val();
                if (friendLoc) document.getElementById('roleDisplay').innerText = "VINCULADO";
                updateUI();
            });
        }

        function syncLoc() { if (myLoc) db.ref('sessions/' + sessionId + '/' + myId).set(myLoc); }

        function updateUI() {
            if (!myLoc || !friendLoc) return;
            const dist = getDistance(myLoc.lat, myLoc.lon, friendLoc.lat, friendLoc.lon);
            const bearing = getBearing(myLoc.lat, myLoc.lon, friendLoc.lat, friendLoc.lon);
            
            // Giro de la flecha central (Relativo a mi vista)
            const arrowAngle = (bearing - heading + 360) % 360;
            document.getElementById('arrow').style.transform = `rotate(${arrowAngle}deg)`;
            
            // Giro del punto orbital (Relativo a mi vista)
            document.getElementById('orbit').style.transform = `rotate(${arrowAngle}deg)`;
            
            // Manejo del Halo Pulsante (Basado en distancia)
            // Cuanto más cerca, más grande y rápido pulsa
            const pulseRate = dist < 0.02 ? 0.5 : (dist < 0.2 ? 1.5 : 3);
            pulseTimer += 0.1;
            const scale = 1.0 + (Math.sin(pulseTimer / pulseRate) * (dist < 0.05 ? 0.2 : 0.05));
            document.documentElement.style.setProperty('--pulse-scale', scale);
            
            document.getElementById('dist').innerText = dist < 1 ? (dist * 1000).toFixed(0) + "m" : dist.toFixed(2) + "km";
            
            const color = dist < 0.03 ? "#4ade80" : (dist < 0.3 ? "#facc15" : "#f87171");
            document.documentElement.style.setProperty('--accent', color);
            document.getElementById('status').innerText = dist < 0.03 ? "OBJETIVO ALCANZADO" : "RASTREANDO...";
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const a = Math.sin(((lat2-lat1)*Math.PI/180)/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(((lon2-lon1)*Math.PI/180)/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function getBearing(lat1, lon1, lat2, lon2) {
            const l1 = lat1 * Math.PI / 180, l2 = lat2 * Math.PI / 180, dl = (lon2 - lon1) * Math.PI / 180;
            const y = Math.sin(dl) * Math.cos(l2), x = Math.cos(l1) * Math.sin(l2) - Math.sin(l1) * Math.cos(l2) * Math.cos(dl);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        // Animación suave del pulso
        function animate() {
            updateUI();
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
