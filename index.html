<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Amigo-Pointer 2026 | Adaptive</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { 
            --accent: #4ade80; 
            --bg: #ffffff; 
            --text: #111111;
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            color: var(--text);
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            height: 100vh; 
            height: 100dvh; /* Dynamic viewport height para móviles */
            overflow: hidden; 
        }

        /* Pantalla de Inicio - Adaptativa */
        #setup { 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%; 
            max-width: 500px; 
            padding: 40px 10%;
            height: 100%;
        }

        h1 { font-size: clamp(28px, 8vw, 42px); margin: 0; font-weight: 900; letter-spacing: -1px; text-align: center; }
        .subtitle { color: #888; font-size: 14px; letter-spacing: 3px; margin-bottom: 40px; text-align: center; font-weight: 600; }

        .btn { 
            background: #000; 
            color: #fff; 
            border: none; 
            padding: 20px; 
            border-radius: 18px; 
            font-weight: 800; 
            cursor: pointer; 
            width: 100%; 
            font-size: 18px; 
            transition: transform 0.1s, opacity 0.1s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        
        input { 
            width: 100%; 
            padding: 20px; 
            margin: 15px 0; 
            border: 3px solid #f5f5f5; 
            border-radius: 18px; 
            font-size: 26px; 
            text-align: center; 
            background: #fafafa;
            font-weight: 900;
            color: #000;
        }

        /* Pantalla de la Brújula - Adaptativa */
        #app { 
            display: none; 
            flex-direction: column;
            width: 100%; 
            height: 100%; 
            padding: var(--safe-top) 20px var(--safe-bottom);
        }

        .header { 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 20px;
        }

        .room-tag { 
            background: #000; 
            color: #fff; 
            padding: 10px 25px; 
            border-radius: 30px; 
            font-size: clamp(18px, 5vw, 24px); 
            font-weight: 900; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .main-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .compass-outer { 
            position: relative; 
            width: clamp(250px, 70vmin, 400px); 
            height: clamp(250px, 70vmin, 400px); 
            border: 8px solid var(--accent); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: radial-gradient(circle, #ffffff 0%, #f7f7f7 100%); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            transition: border-color 0.3s ease;
        }

        #arrow { 
            width: 0; 
            height: 0; 
            border-left: clamp(15px, 4vmin, 25px) solid transparent; 
            border-right: clamp(15px, 4vmin, 25px) solid transparent; 
            border-bottom: clamp(50px, 12vmin, 80px) solid var(--accent); 
            transition: transform 0.15s cubic-bezier(0.1, 0.5, 0.5, 1), border-bottom-color 0.3s; 
        }

        .center-pin {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #222;
            border-radius: 50%;
            border: 2px solid white;
        }
        
        .info-panel {
            text-align: center;
            margin-top: 20px;
        }

        #dist { 
            font-size: clamp(50px, 15vw, 85px); 
            font-weight: 900; 
            line-height: 1;
            margin: 10px 0;
            letter-spacing: -2px;
        }
        #status { font-size: 14px; color: #aaa; letter-spacing: 4px; font-weight: 800; }
        
        .footer {
            padding: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .exit-btn { 
            color: #ff4444; 
            font-weight: 800; 
            font-size: 14px;
            letter-spacing: 1px;
            padding: 12px 30px;
            border-radius: 12px;
            border: 2px solid #ff4444;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="setup">
        <h1>🦅 AMIGO-POINTER</h1>
        <div class="subtitle">LOCALIZADOR ATÓMICO 2026</div>
        
        <button class="btn" onclick="createRoom()">NUEVA SALA</button>
        
        <div style="width:100%; display: flex; align-items: center; margin: 30px 0;">
            <div style="flex:1; height:2px; background:#f0f0f0;"></div>
            <span style="padding: 0 15px; color:#ddd; font-weight:bold;">O</span>
            <div style="flex:1; height:2px; background:#f0f0f0;"></div>
        </div>
        
        <input type="number" id="roomCode" placeholder="CÓDIGO AMIGO" pattern="\d*">
        <button class="btn" style="background: #333;" onclick="joinRoom()">CONECTAR</button>
    </div>

    <div id="app">
        <div class="header">
            <span class="room-tag" id="roomDisplay">SALA: ----</span>
            <div id="roleDisplay" style="margin-top: 12px; font-size: 12px; font-weight: bold; color: #888; letter-spacing: 1px;">VINCULANDO...</div>
        </div>
        
        <div class="main-view">
            <div class="compass-outer">
                <div id="arrow"></div>
                <div class="center-pin"></div>
            </div>
            
            <div class="info-panel">
                <div id="dist">--m</div>
                <div id="status">UBICANDO...</div>
            </div>
        </div>
        
        <div class="footer">
            <div class="exit-btn" onclick="location.reload()">CERRAR SESIÓN</div>
        </div>
    </div>

    <script>
        // CONFIG
        const firebaseConfig = { databaseURL: "https://amigo-pointer-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let sessionId = "", myId = "", myLoc = null, friendLoc = null, heading = 0;

        // SENSORES
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientationabsolute', (e) => {
                heading = e.alpha || e.webkitCompassHeading || 0;
                updateUI();
            }, true);
        }

        navigator.geolocation.watchPosition((pos) => {
            myLoc = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            if (sessionId) syncLoc();
            updateUI();
        }, null, { enableHighAccuracy: true });

        // SALAS
        function createRoom() {
            sessionId = Math.floor(1000 + Math.random() * 9000).toString();
            myId = "u1";
            db.ref('sessions/' + sessionId).set({ created: Date.now() });
            startSession();
        }

        function joinRoom() {
            sessionId = document.getElementById('roomCode').value;
            if (sessionId.length < 4) return;
            myId = "u2";
            startSession();
        }

        function startSession() {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('roomDisplay').innerText = "CÓDIGO: " + sessionId;
            
            const friendId = myId === "u1" ? "u2" : "u1";
            db.ref('sessions/' + sessionId + '/' + friendId).on('value', (snap) => {
                friendLoc = snap.val();
                if (friendLoc) document.getElementById('roleDisplay').innerText = "CONEXIÓN ESTABLE";
                updateUI();
            });
        }

        function syncLoc() { if (myLoc) db.ref('sessions/' + sessionId + '/' + myId).set(myLoc); }

        // CÁLCULOS
        function updateUI() {
            if (!myLoc || !friendLoc) return;
            const dist = getDistance(myLoc.lat, myLoc.lon, friendLoc.lat, friendLoc.lon);
            const bearing = getBearing(myLoc.lat, myLoc.lon, friendLoc.lat, friendLoc.lon);
            const angle = (bearing - heading + 360) % 360;
            
            document.getElementById('arrow').style.transform = `rotate(${angle}deg)`;
            document.getElementById('dist').innerText = dist < 1 ? (dist * 1000).toFixed(0) + "m" : dist.toFixed(2) + "km";
            
            const color = dist < 0.03 ? "#4ade80" : (dist < 0.3 ? "#facc15" : "#f87171");
            document.documentElement.style.setProperty('--accent', color);
            document.getElementById('status').innerText = dist < 0.03 ? "¡OBJETIVO A LA VISTA!" : "SIGUE EL RUMBO";
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180, dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function getBearing(lat1, lon1, lat2, lon2) {
            const l1 = lat1 * Math.PI / 180, l2 = lat2 * Math.PI / 180, dl = (lon2 - lon1) * Math.PI / 180;
            const y = Math.sin(dl) * Math.cos(l2), x = Math.cos(l1) * Math.sin(l2) - Math.sin(l1) * Math.cos(l2) * Math.cos(dl);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }
    </script>
</body>
</html>
