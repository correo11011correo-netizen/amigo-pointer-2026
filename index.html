<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Amigo-Pointer 2026 | App Native Pro</title>
    <style>
        :root { 
            --accent: #4285F4; 
            --bg: #000000; 
            --nav-bg: #0a0a0a;
            --text: #ffffff;
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: var(--text);
            overflow: hidden; /* BLOQUEO DE SCROLL DEL NAVEGADOR */
            font-family: 'Inter', -apple-system, sans-serif;
        }

        /* --- PANTALLA DE INICIO (ESTADO FIJO) --- */
        #setup { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            width: 100%; height: 100dvh; padding: 0 10%; text-align: center;
        }
        h1 { font-size: 32px; font-weight: 900; letter-spacing: -1px; margin-bottom: 30px; }
        .btn { background: #fff; color: #000; border: none; padding: 20px; border-radius: 16px; font-weight: 800; cursor: pointer; width: 100%; font-size: 16px; }
        input { width: 100%; padding: 20px; margin: 10px 0; border: 1px solid #333; border-radius: 16px; font-size: 24px; text-align: center; background: #111; color: #fff; font-weight: 900; }

        /* --- ESTRUCTURA DE APP NATIVA --- */
        #app { 
            display: none; flex-direction: column; width: 100%; height: 100dvh; 
            position: relative; padding-top: var(--safe-top); padding-bottom: var(--safe-bottom);
        }

        /* VISTAS INTERNAS */
        .view-container { flex: 1; position: relative; width: 100%; overflow: hidden; }
        .view { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; }
        .view.active { display: flex; }

        /* VISTA: RADAR */
        #view-radar { align-items: center; justify-content: center; background: radial-gradient(circle, #0d0d0d 0%, #000 100%); }
        .radar-frame {
            position: relative; width: clamp(280px, 80vmin, 400px); height: clamp(280px, 80vmin, 400px);
            border: 2px solid rgba(66, 133, 244, 0.1); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .orbit { position: absolute; width: 100%; height: 100%; border-radius: 50%; transition: transform 0.4s cubic-bezier(0.1, 0.5, 0.5, 1); }
        .friend-dot { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 22px; height: 22px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 20px var(--accent); border: 3px solid #fff; }
        .arrow { width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-bottom: 50px solid var(--accent); transition: transform 0.2s; filter: drop-shadow(0 0 10px var(--accent)); }
        .dist-box { text-align: center; margin-top: 30px; }
        .dist-val { font-size: 70px; font-weight: 900; line-height: 1; letter-spacing: -3px; }
        .dist-label { font-size: 12px; letter-spacing: 5px; color: #555; font-weight: 800; text-transform: uppercase; }

        /* VISTA: LOGS (BLACK BOX) */
        #view-logs { background: #000; }
        .log-header { padding: 15px 20px; background: #0a0a0a; border-bottom: 1px solid #222; font-size: 10px; font-weight: 900; letter-spacing: 2px; color: #555; display: flex; justify-content: space-between; }
        .log-area { flex: 1; overflow-y: auto; padding: 20px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #0f0; line-height: 1.5; }
        .raw-packet { background: #080808; padding: 12px; margin: 10px 0; border: 1px solid #1a1a1a; color: #4285F4; white-space: pre-wrap; word-break: break-all; border-radius: 8px; }

        /* BARRA DE NAVEGACIÓN INFERIOR (APP TABS) */
        .bottom-nav {
            height: 70px; width: 100%; background: var(--nav-bg); 
            border-top: 1px solid #222; display: flex; align-items: center; 
            padding: 0 10px;
        }
        .nav-item { 
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; color: #444; cursor: pointer; transition: all 0.2s;
        }
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 20px; margin-bottom: 4px; }
        .nav-label { font-size: 10px; font-weight: 900; letter-spacing: 1px; }

        .gps-pill { position: absolute; top: 15px; right: 20px; padding: 4px 10px; border-radius: 20px; background: #111; font-size: 9px; font-weight: 900; color: #444; border: 1px solid #222; z-index: 100; }
        .gps-active { color: #4ade80 !important; border-color: #4ade8055; }
    </style>
</head>
<body>

    <!-- SCREEN 1: SETUP -->
    <div id="setup">
        <h1 style="margin-bottom: 5px;">RADAR POINTER</h1>
        <div style="color:var(--accent); font-size: 11px; font-weight: 900; letter-spacing: 4px; margin-bottom: 40px;">NATIVE ENGINE 2026</div>
        <button class="btn" onclick="createRoom()">CREAR NUEVA SALA</button>
        <div style="margin: 25px 0; font-size: 10px; color: #333; font-weight: bold;">O VINCULAR DISPOSITIVO</div>
        <input type="number" id="roomCode" placeholder="0000" maxlength="4">
        <button class="btn" style="background: #222; color: #fff;" onclick="joinRoom()">UNIRSE A SALA</button>
    </div>

    <!-- SCREEN 2: NATIVE APP INTERFACE -->
    <div id="app">
        <div class="gps-pill" id="gpsVisual">🛰️ GPS: OFF</div>

        <!-- CONTENEDOR DE VISTAS -->
        <div class="view-container">
            <!-- SECCIÓN: RADAR -->
            <div id="view-radar" class="view active">
                <div style="position: absolute; top: 15px; left: 20px; font-size: 11px; font-weight: 900; opacity: 0.3;" id="roomDisplay">SALA: ----</div>
                <div class="radar-frame">
                    <div class="orbit" id="orbit"><div class="friend-dot"></div></div>
                    <div class="arrow" id="arrow"></div>
                </div>
                <div class="dist-box">
                    <div class="dist-val" id="dist">--</div>
                    <div class="dist-label" id="unit">BUSCANDO...</div>
                </div>
            </div>

            <!-- SECCIÓN: LOGS (BLACK BOX) -->
            <div id="view-logs" class="view">
                <div class="log-header">
                    <span>RAW TRAFFIC MONITOR (BLACK BOX)</span>
                    <span style="color: #f44; cursor: pointer;" onclick="location.reload()">TERMINAR</span>
                </div>
                <div class="log-area" id="log-console">
                    [SYSTEM] Kernel iniciado. Seleccione Radar para comenzar.
                </div>
            </div>
        </div>

        <!-- BOTTOM NAV BAR -->
        <nav class="bottom-nav">
            <div class="nav-item active" id="nav-radar" onclick="switchView('radar')">
                <div class="nav-icon">🛰️</div>
                <div class="nav-label">RADAR</div>
            </div>
            <div class="nav-item" id="nav-logs" onclick="switchView('logs')">
                <div class="nav-icon">📊</div>
                <div class="nav-label">DIAGNOSTIC</div>
            </div>
        </nav>
    </div>

    <script>
        const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbzpbZICE4tLFTlwTQxSyVe_2q3H7SW5qHG74MUymTA1-qs_4UNnDCyvPcIxoVsK9prGUg/exec";
        let sessionId = "", myId = "", myLoc = null, friendLoc = null, heading = 0;

        // --- NAVEGACIÓN ENTRE VISTAS ---
        function switchView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById('view-' + viewId).classList.add('active');
            document.getElementById('nav-' + viewId).classList.add('active');
        }

        // --- FUNCIÓN DE LOGS (LÓGICA PROTEGIDA) ---
        function addLog(msg, raw = null) {
            const console = document.getElementById('log-console');
            const time = new Date().toLocaleTimeString();
            let html = `<div style="margin-bottom:12px;">[${time}] ${msg}`;
            if (raw) html += `<div class="raw-packet">${JSON.stringify(raw, null, 2)}</div>`;
            html += `</div>`;
            console.innerHTML += html;
            console.scrollTop = console.scrollHeight;
        }

        // GPS
        navigator.geolocation.watchPosition((pos) => {
            myLoc = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            document.getElementById('gpsVisual').innerText = "🛰️ GPS: ACTIVE";
            document.getElementById('gpsVisual').classList.add('gps-active');
            if(!sessionId) addLog("GPS_FIX_ESTABLISHED", myLoc);
        }, (err) => {
            document.getElementById('gpsVisual').innerText = "🛰️ GPS: ERROR";
            addLog("GPS_ERROR: " + err.message);
        }, { enableHighAccuracy: true });

        // SENSORES
        window.addEventListener('deviceorientationabsolute', (e) => {
            heading = e.alpha || e.webkitCompassHeading || 0;
            if(sessionId && friendLoc) updateUI();
        }, true);

        // MOTOR SYNC (JSONP)
        function sync() {
            if (!sessionId || !myLoc) return;
            const cb = "cb_" + Date.now();
            const url = `${GOOGLE_URL}?sala=${sessionId}&userId=${myId}&lat=${myLoc.lat}&lon=${myLoc.lon}&callback=${cb}`;
            addLog("OUTGOING_REQUEST", { url: url });

            const script = document.createElement("script");
            script.src = url;
            window[cb] = function(res) {
                addLog("INCOMING_RAW_RESPONSE", res);
                if (res.status === "DEBUG_OK" && res.friend_data) {
                    friendLoc = res.friend_data;
                    updateUI();
                }
                delete window[cb];
                document.body.removeChild(script);
            };
            document.body.appendChild(script);
        }

        setInterval(sync, 4000);

        function createRoom() {
            sessionId = Math.floor(1000 + Math.random() * 9000).toString();
            myId = "u1";
            launch();
        }

        function joinRoom() {
            const code = document.getElementById('roomCode').value;
            if (code.length < 4) return;
            sessionId = code;
            myId = "u2";
            launch();
        }

        function launch() {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('roomDisplay').innerText = "SALA: " + sessionId;
            addLog(`SALA_ACTIVA: ${sessionId} | ROLE: ${myId}`);
        }

        function updateUI() {
            if (!myLoc || !friendLoc) return;
            const dist = getDistance(myLoc.lat, myLoc.lon, friendLoc.lat, friendLoc.lon);
            const bearing = getBearing(myLoc.lat, myLoc.lon, friendLoc.lat, friendLoc.lon);
            const angle = (bearing - heading + 360) % 360;
            document.getElementById('arrow').style.transform = `rotate(${angle}deg)`;
            document.getElementById('orbit').style.transform = `rotate(${angle}deg)`;
            
            if (dist < 1) {
                document.getElementById('dist').innerText = (dist * 1000).toFixed(0);
                document.getElementById('unit').innerText = "METROS";
            } else {
                document.getElementById('dist').innerText = dist.toFixed(2);
                document.getElementById('unit').innerText = "KILÓMETROS";
            }
            
            const color = dist < 0.03 ? "#4ade80" : (dist < 0.3 ? "#FBBC05" : "#EA4335");
            document.documentElement.style.setProperty('--accent', color);
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const a = Math.sin(((lat2-lat1)*Math.PI/180)/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(((lon2-lon1)*Math.PI/180)/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function getBearing(lat1, lon1, lat2, lon2) {
            const l1 = lat1 * Math.PI / 180, l2 = lat2 * Math.PI / 180, dl = (lon2 - lon1) * Math.PI / 180;
            const y = Math.sin(dl) * Math.cos(l2), x = Math.cos(l1) * Math.sin(l2) - Math.sin(l1) * Math.cos(l2) * Math.cos(dl);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }
    </script>
</body>
</html>
