<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Amigo-Pointer 2026 | Party Edition</title>
    <style>
        :root { 
            --accent: #ff00ff; /* Magenta Neón */
            --bg: #0f051a; /* Púrpura profundo */
            --text: #ffffff;
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: var(--text);
            overflow: hidden; 
            font-family: 'Inter', sans-serif;
        }

        /* --- LOGO PARTY --- */
        .party-icon { font-size: 40px; margin-bottom: 20px; text-shadow: 0 0 20px var(--accent); }

        /* --- PANTALLA DE INICIO --- */
        #setup { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            width: 100%; height: 100dvh; padding: 0 10%; text-align: center;
            background: radial-gradient(circle at top, #2a0a4a 0%, #0f051a 100%);
        }

        h1 { font-size: 34px; font-weight: 900; letter-spacing: -1px; margin: 0; color: #fff; text-shadow: 0 0 15px rgba(255,0,255,0.5); }
        .party-tag { color: var(--accent); font-size: 12px; font-weight: 800; letter-spacing: 3px; margin-top: 5px; }

        .setup-card {
            margin-top: 40px; width: 100%; max-width: 400px;
        }

        .btn { 
            background: var(--accent); color: #fff; border: none; padding: 20px; border-radius: 20px; 
            font-weight: 900; cursor: pointer; width: 100%; font-size: 16px; 
            box-shadow: 0 10px 30px rgba(255,0,255,0.3); transition: 0.2s;
        }
        .btn:active { transform: scale(0.95); }
        .btn-join { background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.1); color: #fff; margin-top: 15px; box-shadow: none; }

        input { 
            width: 100%; padding: 20px; margin: 30px 0 10px; border: 2px solid rgba(255,255,255,0.1); border-radius: 20px; 
            font-size: 36px; text-align: center; background: rgba(255,255,255,0.05); color: #fff; font-weight: 900;
        }

        /* --- INTERFAZ APP --- */
        #app { display: none; flex-direction: column; width: 100%; height: 100dvh; position: relative; }

        .top-bar {
            padding: var(--safe-top) 20px 0; height: 80px; display: flex; 
            justify-content: space-between; align-items: center; z-index: 100;
        }
        .close-btn { background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 12px; font-size: 10px; font-weight: 900; color: #fff; cursor: pointer; }
        .room-tag { font-size: 14px; font-weight: 900; color: var(--accent); text-shadow: 0 0 10px var(--accent); }

        .view-container { flex: 1; position: relative; width: 100%; overflow: hidden; }
        .view { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; }
        .view.active { display: flex; }

        /* RADAR VIEW */
        #view-radar { align-items: center; justify-content: center; }
        .radar-glow {
            position: relative; width: clamp(280px, 80vmin, 400px); height: clamp(280px, 80vmin, 400px);
            border: 4px solid rgba(255,0,255,0.1); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 50px rgba(255,0,255,0.05);
        }
        .radar-glow::before { content: ''; position: absolute; width: 100%; height: 100%; border: 2px solid var(--accent); border-radius: 50%; opacity: 0.2; animation: scan 3s infinite ease-out; }
        @keyframes scan { 0% { transform: scale(0.5); opacity: 0.8; } 100% { transform: scale(1.1); opacity: 0; } }

        .orbit { position: absolute; width: 100%; height: 100%; border-radius: 50%; transition: transform 0.6s cubic-bezier(0.1, 0.5, 0.5, 1); }
        .friend-led { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 30px; height: 30px; background: #fff; border-radius: 50%; box-shadow: 0 0 30px #fff, 0 0 60px var(--accent); border: 5px solid var(--accent); }

        .arrow-party { width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-bottom: 60px solid #fff; transition: transform 0.3s; filter: drop-shadow(0 0 20px var(--accent)); }
        
        .distance-panel { text-align: center; margin-top: 40px; }
        .dist-num { font-size: 80px; font-weight: 900; margin: 0; line-height: 1; color: #fff; text-shadow: 0 0 20px var(--accent); }
        .dist-text { font-size: 14px; font-weight: 800; color: var(--accent); letter-spacing: 5px; opacity: 0.7; }

        /* LOGS VIEW (BLACK BOX) */
        .log-screen { flex: 1; overflow-y: auto; padding: 20px; font-family: monospace; font-size: 11px; color: #4ade80; background: #000; }
        .raw-log-box { background: #0a0a0a; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #222; color: #00ffff; white-space: pre-wrap; word-break: break-all; }

        /* BOTTOM NAV */
        .nav-party {
            height: 80px; background: rgba(0,0,0,0.5); border-top: 1px solid rgba(255,255,255,0.05); 
            display: flex; padding-bottom: var(--safe-bottom); backdrop-filter: blur(10px);
        }
        .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: rgba(255,255,255,0.2); font-size: 10px; font-weight: 900; letter-spacing: 1px; }
        .nav-btn.active { color: #fff; }
        .nav-btn .ico { font-size: 24px; margin-bottom: 4px; }

        .gps-led { position: fixed; top: 15px; right: 20px; font-size: 10px; font-weight: 900; color: #444; z-index: 200; }
        .gps-on { color: #00ff00 !important; text-shadow: 0 0 10px #00ff00; }
    </style>
</head>
<body>

    <!-- SCREEN 1: SETUP -->
    <div id="setup">
        <div class="party-icon">✨</div>
        <h1>AMIGO FINDER</h1>
        <div class="party-tag">PARTY ENGINE 2026</div>

        <div class="setup-card">
            <button class="btn" onclick="createRoom()">NUEVA SALA</button>
            <input type="number" id="roomCode" placeholder="0000" maxlength="4">
            <button class="btn btn-join" onclick="joinRoom()">UNIRSE A FIESTA</button>
        </div>
    </div>

    <!-- SCREEN 2: RADAR -->
    <div id="app">
        <div class="gps-led" id="gpsLed">GPS: OFF</div>

        <header class="top-bar">
            <div class="close-btn" onclick="exit()">SALIR</div>
            <div class="room-tag" id="roomDisp">SALA: 0000</div>
        </header>

        <main class="view-container">
            <section id="view-radar" class="view active">
                <div class="radar-glow">
                    <div class="orbit" id="orbit"><div class="friend-led"></div></div>
                    <div class="arrow-party" id="arrow"></div>
                </div>
                <div class="distance-panel">
                    <h2 class="dist-num" id="dist">--</h2>
                    <span class="dist-text" id="unit">BUSCANDO AMIGO...</span>
                </div>
            </section>

            <section id="view-logs" class="view">
                <div class="log-screen" id="log-console">
                    [SYSTEM] Party Sync Iniciado...
                </div>
            </section>
        </main>

        <nav class="nav-party">
            <div class="nav-btn active" id="tab-radar" onclick="showTab('radar')">
                <span class="ico">📍</span><span>RADAR</span>
            </div>
            <div class="nav-btn" id="tab-logs" onclick="showTab('logs')">
                <span class="ico">📊</span><span>BLACK BOX</span>
            </div>
        </nav>
    </div>

    <script>
        const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbzpbZICE4tLFTlwTQxSyVe_2q3H7SW5qHG74MUymTA1-qs_4UNnDCyvPcIxoVsK9prGUg/exec";
        let sessionId = "", myId = "", myLoc = null, friendLoc = null, heading = 0;

        function showTab(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            document.getElementById('tab-' + id).classList.add('active');
        }

        function exit() { if(confirm("¿Salir de la fiesta?")) location.reload(); }

        // --- BLACK BOX ENGINE (PROTECTED) ---
        function addLog(msg, raw = null) {
            const console = document.getElementById('log-console');
            const time = new Date().toLocaleTimeString();
            let html = `<div style="margin-bottom:15px; border-bottom: 1px solid #111; padding-bottom: 10px;">[${time}] ${msg}`;
            if (raw) html += `<div class="raw-log-box">${JSON.stringify(raw, null, 2)}</div>`;
            html += `</div>`;
            console.innerHTML += html;
            console.scrollTop = console.scrollHeight;
        }

        navigator.geolocation.watchPosition((pos) => {
            myLoc = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            document.getElementById('gpsLed').innerText = "GPS: ACTIVE";
            document.getElementById('gpsLed').classList.add('gps-on');
            if(!sessionId) addLog("GPS_CONNECTED", myLoc);
        }, (err) => addLog("GPS_ERROR: " + err.message), { enableHighAccuracy: true });

        window.addEventListener('deviceorientationabsolute', (e) => {
            heading = e.alpha || e.webkitCompassHeading || 0;
            if(sessionId && friendLoc) updateUI();
        }, true);

        function sync() {
            if (!sessionId || !myLoc) return;
            const cb = "cb_" + Date.now();
            const url = `${GOOGLE_URL}?sala=${sessionId}&userId=${myId}&lat=${myLoc.lat}&lon=${myLoc.lon}&callback=${cb}`;
            addLog("PULSE_OUT", { sala: sessionId });
            const script = document.createElement("script");
            script.src = url;
            window[cb] = function(res) {
                addLog("PULSE_IN", res);
                if (res.status === "DEBUG_OK" && res.friend_data) {
                    friendLoc = res.friend_data;
                    updateUI();
                }
                delete window[cb];
                document.body.removeChild(script);
            };
            document.body.appendChild(script);
        }

        setInterval(sync, 4000);

        function createRoom() {
            sessionId = Math.floor(1000 + Math.random() * 9000).toString();
            myId = "u1"; start();
        }

        function joinRoom() {
            const code = document.getElementById('roomCode').value;
            if (code.length < 4) return;
            sessionId = code; myId = "u2"; start();
        }

        function start() {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('roomDisp').innerText = "SALA: " + sessionId;
            addLog(`PARTY_START: ${sessionId} | ROLE: ${myId}`);
        }

        function updateUI() {
            if (!myLoc || !friendLoc) return;
            const dist = getDistance(myLoc.lat, myLoc.lon, friendLoc.lat, friendLoc.lon);
            const bearing = getBearing(myLoc.lat, myLoc.lon, friendLoc.lat, friendLoc.lon);
            const angle = (bearing - heading + 360) % 360;
            document.getElementById('arrow').style.transform = `rotate(${angle}deg)`;
            document.getElementById('orbit').style.transform = `rotate(${angle}deg)`;
            if (dist < 1) {
                document.getElementById('dist').innerText = (dist * 1000).toFixed(0);
                document.getElementById('unit').innerText = "METROS";
            } else {
                document.getElementById('dist').innerText = dist.toFixed(2);
                document.getElementById('unit').innerText = "KILÓMETROS";
            }
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const a = Math.sin(((lat2-lat1)*Math.PI/180)/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(((lon2-lon1)*Math.PI/180)/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function getBearing(lat1, lon1, lat2, lon2) {
            const l1 = lat1 * Math.PI / 180, l2 = lat2 * Math.PI / 180, dl = (lon2 - lon1) * Math.PI / 180;
            const y = Math.sin(dl) * Math.cos(l2), x = Math.cos(l1) * Math.sin(l2) - Math.sin(l1) * Math.cos(l2) * Math.cos(dl);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }
    </script>
</body>
</html>
