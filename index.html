<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Amigo-Pointer 2026 | App Premium</title>
    <style>
        :root { 
            --accent: #4285F4; 
            --bg: #000000; 
            --nav-bg: #0a0a0a;
            --text: #ffffff;
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: var(--text);
            overflow: hidden; 
            font-family: 'Inter', -apple-system, sans-serif;
        }

        /* --- PANTALLA DE INICIO (REDISEÑADA) --- */
        #setup { 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            width: 100%; height: 100dvh; padding: 0 10%; text-align: center;
        }

        .logo-area { margin-bottom: 50px; }
        .logo-area h1 { font-size: 36px; font-weight: 900; letter-spacing: -2px; margin: 0; }
        .logo-area p { color: var(--accent); font-size: 11px; font-weight: 800; letter-spacing: 5px; margin: 5px 0 0; }

        .setup-card {
            background: #0a0a0a; border: 1px solid #1a1a1a; padding: 40px 30px; border-radius: 30px;
            width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .btn { background: #fff; color: #000; border: none; padding: 20px; border-radius: 20px; font-weight: 900; cursor: pointer; width: 100%; font-size: 16px; transition: 0.2s; }
        .btn:active { transform: scale(0.96); }
        .btn-link { background: transparent; border: 1px solid #333; color: #fff; margin-top: 15px; }

        .code-input-box { margin: 30px 0; position: relative; }
        .code-input-box input { width: 100%; padding: 20px; border: 2px solid #222; border-radius: 20px; font-size: 32px; text-align: center; background: #000; color: #fff; font-weight: 900; font-family: monospace; letter-spacing: 5px; }
        .code-input-box label { position: absolute; top: -10px; left: 20px; background: #0a0a0a; padding: 0 10px; font-size: 10px; font-weight: 800; color: #444; }

        /* --- INTERFAZ APP --- */
        #app { display: none; flex-direction: column; width: 100%; height: 100dvh; position: relative; }

        /* TOP NAV */
        .top-nav {
            padding: var(--safe-top) 20px 0; height: 100px; display: flex; 
            justify-content: space-between; align-items: center; z-index: 100;
        }
        .back-btn { background: #111; border: 1px solid #222; padding: 10px 18px; border-radius: 12px; font-size: 11px; font-weight: 900; color: #f44; cursor: pointer; }
        .room-info { background: #111; padding: 10px 18px; border-radius: 12px; font-size: 14px; font-weight: 900; font-family: monospace; color: var(--accent); }

        /* VIEWS */
        .view-container { flex: 1; position: relative; width: 100%; overflow: hidden; }
        .view { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; }
        .view.active { display: flex; }

        /* RADAR VIEW */
        #view-radar { align-items: center; justify-content: center; background: radial-gradient(circle, #0d0d0d 0%, #000 100%); }
        .radar-shell {
            position: relative; width: clamp(280px, 80vmin, 400px); height: clamp(280px, 80vmin, 400px);
            border: 2px solid rgba(66, 133, 244, 0.1); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .orbit { position: absolute; width: 100%; height: 100%; border-radius: 50%; transition: transform 0.4s cubic-bezier(0.1, 0.5, 0.5, 1); }
        .friend-dot { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); width: 24px; height: 24px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 25px var(--accent); border: 4px solid #fff; }
        .arrow-v { width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; border-bottom: 60px solid var(--accent); transition: transform 0.2s; filter: drop-shadow(0 0 15px var(--accent)); }
        .metrics { text-align: center; margin-top: 35px; }
        .metrics h2 { font-size: 80px; font-weight: 900; margin: 0; line-height: 0.8; letter-spacing: -5px; }
        .metrics span { font-size: 13px; font-weight: 900; color: #444; letter-spacing: 5px; text-transform: uppercase; }

        /* LOGS VIEW */
        .log-screen { flex: 1; overflow-y: auto; padding: 20px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #0f0; background: #000; line-height: 1.6; }
        .raw-data-box { background: #080808; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #111; color: #4285F4; white-space: pre-wrap; word-break: break-all; }

        /* BOTTOM NAV */
        .bottom-tabs {
            height: 75px; background: #050505; border-top: 1px solid #1a1a1a; 
            display: flex; padding-bottom: var(--safe-bottom);
        }
        .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; font-size: 10px; font-weight: 900; letter-spacing: 1px; }
        .tab-btn.active { color: var(--accent); }
        .tab-btn i { font-size: 20px; margin-bottom: 4px; font-style: normal; }

        .gps-status { position: fixed; top: 15px; right: 20px; font-size: 9px; font-weight: 900; background: #111; padding: 4px 10px; border-radius: 20px; color: #444; z-index: 200; border: 1px solid #222; }
        .gps-on { color: #4ade80 !important; border-color: #4ade8055; }
    </style>
</head>
<body>

    <!-- SCREEN 1: SETUP -->
    <div id="setup">
        <div class="logo-area">
            <h1>RADAR POINTER</h1>
            <p>TACTICAL SYNC 2026</p>
        </div>

        <div class="setup-card">
            <button class="btn" onclick="createRoom()">CREAR NUEVA SALA</button>
            <div class="code-input-box">
                <label>VINCULAR AMIGO</label>
                <input type="number" id="roomCode" placeholder="0000" maxlength="4">
            </div>
            <button class="btn btn-link" onclick="joinRoom()">CONECTAR AHORA</button>
        </div>
    </div>

    <!-- SCREEN 2: MAIN APP -->
    <div id="app">
        <div class="gps-status" id="gpsState">🛰️ GPS: SEARCHING</div>

        <header class="top-nav">
            <div class="back-btn" onclick="exitSession()">← VOLVER</div>
            <div class="room-info" id="roomDisplay">ROOM: 0000</div>
        </header>

        <main class="view-container">
            <!-- VISTA: RADAR -->
            <section id="view-radar" class="view active">
                <div class="radar-shell">
                    <div class="orbit" id="orbit"><div class="friend-dot"></div></div>
                    <div class="arrow-v" id="arrow"></div>
                </div>
                <div class="metrics">
                    <h2 id="dist">--</h2>
                    <span id="unit">Buscando...</span>
                </div>
            </section>

            <!-- VISTA: LOGS -->
            <section id="view-logs" class="view">
                <div class="log-screen" id="log-console">
                    [SYSTEM] Cargando registros de tráfico crudo...
                </div>
            </section>
        </main>

        <nav class="bottom-tabs">
            <div class="tab-btn active" id="tab-radar" onclick="showTab('radar')">
                <i>🛰️</i><span>RADAR</span>
            </div>
            <div class="tab-btn" id="tab-logs" onclick="showTab('logs')">
                <i>📊</i><span>BLACK BOX</span>
            </div>
        </nav>
    </div>

    <script>
        const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbzpbZICE4tLFTlwTQxSyVe_2q3H7SW5qHG74MUymTA1-qs_4UNnDCyvPcIxoVsK9prGUg/exec";
        let sessionId = "", myId = "", myLoc = null, friendLoc = null, heading = 0;

        // --- NAVEGACIÓN ---
        function showTab(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            document.getElementById('tab-' + id).classList.add('active');
        }

        function exitSession() {
            if(confirm("¿Deseas cerrar la sesión táctica?")) {
                location.reload();
            }
        }

        // --- LÓGICA DE DIAGNÓSTICO (BLOQUEADA/PROTEGIDA) ---
        function addLog(msg, raw = null) {
            const console = document.getElementById('log-console');
            const time = new Date().toLocaleTimeString();
            let html = `<div style="margin-bottom:15px; border-bottom: 1px solid #111; padding-bottom: 10px;">[${time}] ${msg}`;
            if (raw) html += `<div class="raw-data-box">${JSON.stringify(raw, null, 2)}</div>`;
            html += `</div>`;
            console.innerHTML += html;
            console.scrollTop = console.scrollHeight;
        }

        // GPS
        navigator.geolocation.watchPosition((pos) => {
            myLoc = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            document.getElementById('gpsState').innerText = "🛰️ GPS: ACTIVE";
            document.getElementById('gpsState').classList.add('gps-on');
            if(!sessionId) addLog("GPS_LINK_ESTABLISHED", myLoc);
        }, (err) => {
            addLog("GPS_LINK_ERROR: " + err.message);
        }, { enableHighAccuracy: true });

        // SENSORES
        window.addEventListener('deviceorientationabsolute', (e) => {
            heading = e.alpha || e.webkitCompassHeading || 0;
            if(sessionId && friendLoc) updateUI();
        }, true);

        // SYNC ENGINE
        function sync() {
            if (!sessionId || !myLoc) return;
            const cb = "cb_" + Date.now();
            const url = `${GOOGLE_URL}?sala=${sessionId}&userId=${myId}&lat=${myLoc.lat}&lon=${myLoc.lon}&callback=${cb}`;
            addLog("OUTGOING_PULSE", { sala: sessionId, lat: myLoc.lat, lon: myLoc.lon });

            const script = document.createElement("script");
            script.src = url;
            window[cb] = function(res) {
                addLog("INCOMING_RAW_DATA", res);
                if (res.status === "DEBUG_OK" && res.friend_data) {
                    friendLoc = res.friend_data;
                    updateUI();
                }
                delete window[cb];
                document.body.removeChild(script);
            };
            document.body.appendChild(script);
        }

        setInterval(sync, 4000);

        function createRoom() {
            sessionId = Math.floor(1000 + Math.random() * 9000).toString();
            myId = "u1";
            launchApp();
        }

        function joinRoom() {
            const code = document.getElementById('roomCode').value;
            if (code.length < 4) return;
            sessionId = code;
            myId = "u2";
            launchApp();
        }

        function launchApp() {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('roomDisplay').innerText = "ROOM: " + sessionId;
            addLog(`SESSION_STARTED: ${sessionId} | ID: ${myId}`);
        }

        function updateUI() {
            if (!myLoc || !friendLoc) return;
            const dist = getDistance(myLoc.lat, myLoc.lon, friendLoc.lat, friendLoc.lon);
            const bearing = getBearing(myLoc.lat, myLoc.lon, friendLoc.lat, friendLoc.lon);
            const angle = (bearing - heading + 360) % 360;
            
            document.getElementById('arrow').style.transform = `rotate(${angle}deg)`;
            document.getElementById('orbit').style.transform = `rotate(${angle}deg)`;
            
            if (dist < 1) {
                document.getElementById('dist').innerText = (dist * 1000).toFixed(0);
                document.getElementById('unit').innerText = "METROS";
            } else {
                document.getElementById('dist').innerText = dist.toFixed(2);
                document.getElementById('unit').innerText = "KILÓMETROS";
            }
            
            const color = dist < 0.03 ? "#4ade80" : (dist < 0.3 ? "#FBBC05" : "#EA4335");
            document.documentElement.style.setProperty('--accent', color);
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const a = Math.sin(((lat2-lat1)*Math.PI/180)/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(((lon2-lon1)*Math.PI/180)/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function getBearing(lat1, lon1, lat2, lon2) {
            const l1 = lat1 * Math.PI / 180, l2 = lat2 * Math.PI / 180, dl = (lon2 - lon1) * Math.PI / 180;
            const y = Math.sin(dl) * Math.cos(l2), x = Math.cos(l1) * Math.sin(l2) - Math.sin(l1) * Math.cos(l2) * Math.cos(dl);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }
    </script>
</body>
</html>
