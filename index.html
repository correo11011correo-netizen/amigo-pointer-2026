<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Amigo-Pointer 2026 | FULL TRACE</title>
    <style>
        :root { --accent: #4285F4; --bg: #000; --text: #fff; }
        body { font-family: monospace; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        
        #setup { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 40px; }
        .btn { background: #fff; color: #000; border: none; padding: 20px; border-radius: 12px; font-weight: bold; margin: 10px 0; width: 100%; cursor: pointer; }
        input { background: #111; color: #fff; border: 1px solid #333; padding: 20px; border-radius: 12px; width: 100%; text-align: center; font-size: 20px; }

        #app { display: none; flex: 1; flex-direction: column; }
        .radar-box { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
        #arrow { width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-bottom: 60px solid var(--accent); transition: transform 0.2s; }
        
        #black-box { height: 60%; background: #080808; border-top: 1px solid #444; overflow-y: auto; padding: 15px; font-size: 10px; }
        .log-entry { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #111; }
        .log-time { color: #888; }
        .log-tag { font-weight: bold; padding: 2px 5px; border-radius: 3px; margin-right: 5px; }
        .tag-out { background: #444; color: #fff; }
        .tag-in { background: #004400; color: #0f0; }
        .tag-err { background: #440000; color: #f44; }
        .raw-json { background: #000; padding: 10px; border: 1px solid #222; margin-top: 5px; color: #4285F4; white-space: pre-wrap; word-break: break-all; }
        .url-debug { color: #666; font-size: 8px; margin-top: 2px; }
    </style>
</head>
<body>

    <div id="setup">
        <h1 style="text-align: center;">🦅 RADAR 2026</h1>
        <button class="btn" onclick="createRoom()">CREAR SALA</button>
        <div style="height: 20px;"></div>
        <input type="number" id="roomCode" placeholder="CÓDIGO AMIGO">
        <button class="btn" style="background: #222; color: #fff;" onclick="joinRoom()">CONECTAR</button>
    </div>

    <div id="app">
        <div class="radar-box">
            <div id="arrow"></div>
            <div id="dist" style="position: absolute; bottom: 20px; font-size: 30px; font-weight: 900;">--m</div>
        </div>

        <div id="black-box">
            <div style="color: #444; margin-bottom: 10px; font-weight: bold;">[BLACK BOX / RAW TRAFFIC MONITOR]</div>
            <div id="log-content"></div>
        </div>
    </div>

    <script>
        const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbzpbZICE4tLFTlwTQxSyVe_2q3H7SW5qHG74MUymTA1-qs_4UNnDCyvPcIxoVsK9prGUg/exec";
        let sessionId = "", myId = "", myLoc = null, friendLoc = null, heading = 0;

        function addLog(tag, msg, data = null, isError = false) {
            const container = document.getElementById('log-content');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            const time = new Date().toLocaleTimeString();
            let html = `<span class="log-time">[${time}]</span> `;
            html += `<span class="log-tag ${isError ? 'tag-err' : (tag === 'IN' ? 'tag-in' : 'tag-out')}">${tag}</span>`;
            html += `<span>${msg}</span>`;
            
            if (data) {
                html += `<div class="raw-json">${typeof data === 'object' ? JSON.stringify(data, null, 2) : data}</div>`;
            }
            
            entry.innerHTML = html;
            container.prepend(entry);
        }

        // SENSORES
        navigator.geolocation.watchPosition((pos) => {
            myLoc = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            if (!sessionId) addLog("GPS", "Coordenadas fijadas", myLoc);
        }, (err) => addLog("GPS", "Error: " + err.message, null, true), { enableHighAccuracy: true });

        window.addEventListener('deviceorientationabsolute', (e) => {
            heading = e.alpha || e.webkitCompassHeading || 0;
        }, true);

        // MOTOR DE SINCRONIZACIÓN ATÓMICO
        function sync() {
            if (!sessionId || !myLoc) return;

            const cbName = "cb_" + Date.now();
            const finalUrl = `${GOOGLE_URL}?sala=${sessionId}&userId=${myId}&lat=${myLoc.lat}&lon=${myLoc.lon}&callback=${cbName}`;
            
            addLog("OUT", "Llamando a Google Script...", { url: finalUrl });

            const script = document.createElement("script");
            script.src = finalUrl;
            
            // Timeout de 10 segundos
            const timer = setTimeout(() => {
                if (window[cbName]) {
                    addLog("ERR", "TIMEOUT: Google no respondió en 10s", null, true);
                    delete window[cbName];
                    document.body.removeChild(script);
                }
            }, 10000);

            window[cbName] = function(raw) {
                clearTimeout(timer);
                addLog("IN", "Respuesta recibida desde Google", raw);
                if (raw.friend_raw) {
                    friendLoc = raw.friend_raw;
                    updateUI();
                }
                delete window[cbName];
                document.body.removeChild(script);
            };

            script.onerror = () => {
                clearTimeout(timer);
                addLog("ERR", "Fallo de red crítico / Bloqueo CORS", null, true);
                document.body.removeChild(script);
            };

            document.body.appendChild(script);
        }

        setInterval(sync, 5000);

        function createRoom() {
            sessionId = Math.floor(1000 + Math.random() * 9000).toString();
            myId = "u1";
            document.getElementById('setup').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            addLog("INIT", "Sala creada", { id: sessionId });
        }

        function joinRoom() {
            const code = document.getElementById('roomCode').value;
            if (code.length < 4) return;
            sessionId = code;
            myId = "u2";
            document.getElementById('setup').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            addLog("INIT", "Unido a sala", { id: sessionId });
        }

        function updateUI() {
            if (!myLoc || !friendLoc) return;
            const dist = getDistance(myLoc.lat, myLoc.lon, friendLoc.lat, friendLoc.lon);
            const bearing = getBearing(myLoc.lat, myLoc.lon, friendLoc.lat, friendLoc.lon);
            const angle = (bearing - heading + 360) % 360;
            document.getElementById('arrow').style.transform = `rotate(${angle}deg)`;
            document.getElementById('dist').innerText = dist < 1 ? (dist * 1000).toFixed(0) + "m" : dist.toFixed(2) + "km";
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const a = Math.sin(((lat2-lat1)*Math.PI/180)/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(((lon2-lon1)*Math.PI/180)/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function getBearing(lat1, lon1, lat2, lon2) {
            const l1 = lat1 * Math.PI / 180, l2 = lat2 * Math.PI / 180, dl = (lon2 - lon1) * Math.PI / 180;
            const y = Math.sin(dl) * Math.cos(l2), x = Math.cos(l1) * Math.sin(l2) - Math.sin(l1) * Math.cos(l2) * Math.cos(dl);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }
    </script>
</body>
</html>
