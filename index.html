<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Amigo-Pointer 2026 | Deep Diagnostic</title>
    <style>
        :root { --accent: #4285F4; --bg: #0a0a0a; --text: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; height: 100dvh; overflow: hidden; }
        
        #setup { display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; max-width: 500px; padding: 40px 10%; height: 100%; }
        .btn { background: #fff; color: #000; border: none; padding: 20px; border-radius: 18px; font-weight: 800; cursor: pointer; width: 100%; font-size: 18px; margin: 10px 0; }
        input { width: 100%; padding: 20px; margin: 15px 0; border: 3px solid #333; border-radius: 18px; font-size: 26px; text-align: center; background: #1a1a1a; color: #fff; font-weight: bold; }

        #app { display: none; flex-direction: column; width: 100%; height: 100%; }
        .main-view { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .radar-box { position: relative; width: 280px; height: 280px; display: flex; align-items: center; justify-content: center; }
        .compass-outer { position: relative; width: 100%; height: 100%; border: 4px solid var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px var(--accent); }
        #arrow { width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-bottom: 50px solid var(--accent); transition: transform 0.2s; }
        
        #dist { font-size: 60px; font-weight: 900; margin-top: 20px; }
        
        /* DIAGNOSTIC PANEL */
        #diag-panel { position: fixed; bottom: 0; left: 0; width: 100%; height: 40%; background: #000; border-top: 2px solid #333; display: flex; flex-direction: column; z-index: 1000; }
        .log-area { flex: 1; overflow-y: auto; padding: 15px; font-family: monospace; font-size: 10px; color: #0f0; background: #000; }
        .log-header { padding: 10px; background: #111; font-size: 11px; font-weight: bold; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
        .raw-data { color: #4285F4; background: #050505; padding: 5px; margin: 5px 0; border-left: 2px solid #4285F4; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div id="setup">
        <h1>🦅 RADAR-POINTER</h1>
        <button class="btn" onclick="createRoom()">CREAR SALA</button>
        <input type="number" id="roomCode" placeholder="CÓDIGO AMIGO">
        <button class="btn" style="background: #333; color: #fff;" onclick="joinRoom()">UNIRSE</button>
    </div>

    <div id="app">
        <div class="main-view">
            <div class="radar-box">
                <div class="compass-outer"><div id="arrow"></div></div>
            </div>
            <div id="dist">--m</div>
        </div>

        <div id="diag-panel">
            <div class="log-header">
                <span>RAW LOGS: GOOGLE SYNC</span>
                <span id="gps-status" style="color: #f87171;">GPS: OFF</span>
            </div>
            <div class="log-area" id="log-console">
                [SYSTEM] Inicializando sensores...
            </div>
        </div>
    </div>

    <script>
        const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbxVo_2XXuldsiRyHDFKjyAbQNsoHuUBhyL4h3oAdEhi5xh9ZKYZHV3pylzBktPOUGwgmg/exec";
        let sessionId = "", myId = "", myLoc = null, friendLoc = null, heading = 0;

        function addLog(msg, raw = null) {
            const console = document.getElementById('log-console');
            const time = new Date().toLocaleTimeString();
            let entry = `<div>[${time}] ${msg}`;
            if (raw) entry += `<div class="raw-data">${JSON.stringify(raw, null, 2)}</div>`;
            entry += `</div>`;
            console.innerHTML += entry;
            console.scrollTop = console.scrollHeight;
        }

        // --- SISTEMA DE GPS CON DIAGNÓSTICO ---
        if ("geolocation" in navigator) {
            addLog("Solicitando permiso de GPS...");
            navigator.geolocation.watchPosition(
                (pos) => {
                    myLoc = { lat: pos.coords.latitude, lon: pos.coords.longitude };
                    document.getElementById('gps-status').innerText = "GPS: OK";
                    document.getElementById('gps-status').style.color = "#4ade80";
                    addLog(`GPS RECIBIDO: ${myLoc.lat.toFixed(5)}, ${myLoc.lon.toFixed(5)}`);
                },
                (err) => {
                    let msg = "Error GPS desconocido";
                    if (err.code === 1) msg = "PERMISO DENEGADO (Activa el GPS)";
                    if (err.code === 2) msg = "POSICIÓN NO DISPONIBLE (Sin señal)";
                    if (err.code === 3) msg = "TIMEOUT GPS";
                    addLog("CRÍTICO: " + msg, {code: err.code});
                    document.getElementById('gps-status').innerText = "GPS: ERROR";
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        } else {
            addLog("ERROR: El navegador no soporta Geolocation", null);
        }

        // --- BRÚJULA FÍSICA ---
        window.addEventListener('deviceorientationabsolute', (e) => {
            heading = e.alpha || e.webkitCompassHeading || 0;
            if (sessionId && friendLoc) updateUI();
        }, true);

        // --- MOTOR DE SINCRONIZACIÓN (JSONP) ---
        function sync() {
            if (!sessionId) return;
            
            if (!myLoc) {
                addLog("SYNC: Esperando señal de GPS válida para enviar...");
                return;
            }

            addLog(`SYNC: Enviando pulsación a Google...`);
            const cb = "cb_" + Math.floor(Math.random() * 100000);
            const script = document.createElement("script");
            script.src = `${GOOGLE_URL}?sala=${sessionId}&userId=${myId}&lat=${myLoc.lat}&lon=${myLoc.lon}&callback=${cb}`;
            
            window[cb] = function(rawResponse) {
                addLog("--- [RAW RESPONSE DESDE GOOGLE] ---", rawResponse);
                if (rawResponse.status === "OK" && rawResponse.friend_data) {
                    friendLoc = rawResponse.friend_data;
                    updateUI();
                }
                delete window[cb];
                document.body.removeChild(script);
            };

            script.onerror = () => {
                addLog("ERROR: Fallo de red al conectar con Google Script.");
                document.body.removeChild(script);
            };
            document.body.appendChild(script);
        }

        // Ciclo de sincronización cada 5 segundos
        setInterval(sync, 5000);

        function createRoom() {
            sessionId = Math.floor(1000 + Math.random() * 9000).toString();
            myId = "u1";
            document.getElementById('setup').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            addLog(`SALA CREADA: ${sessionId} (Líder)`);
        }

        function joinRoom() {
            const code = document.getElementById('roomCode').value;
            if (code.length < 4) return alert("Código inválido");
            sessionId = code;
            myId = "u2";
            document.getElementById('setup').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            addLog(`UNIÉNDOSE A SALA: ${sessionId} (Seguidor)`);
        }

        function updateUI() {
            if (!myLoc || !friendLoc) return;
            const dist = getDistance(myLoc.lat, myLoc.lon, friendLoc.lat, friendLoc.lon);
            const bearing = getBearing(myLoc.lat, myLoc.lon, friendLoc.lat, friendLoc.lon);
            const angle = (bearing - heading + 360) % 360;
            document.getElementById('arrow').style.transform = `rotate(${angle}deg)`;
            document.getElementById('dist').innerText = dist < 1 ? (dist * 1000).toFixed(0) + "m" : dist.toFixed(2) + "km";
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const a = Math.sin(((lat2-lat1)*Math.PI/180)/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(((lon2-lon1)*Math.PI/180)/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function getBearing(lat1, lon1, lat2, lon2) {
            const l1 = lat1 * Math.PI / 180, l2 = lat2 * Math.PI / 180, dl = (lon2 - lon1) * Math.PI / 180;
            const y = Math.sin(dl) * Math.cos(l2), x = Math.cos(l1) * Math.sin(l2) - Math.sin(l1) * Math.cos(l2) * Math.cos(dl);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }
    </script>
</body>
</html>
